<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>우리집 여행비서</title>
  <style>
    body, html { 
        margin: 0; 
        padding: 0; 
        height: 100%; 
        width: 100%;
        overflow: hidden; 
        background-color: #F2F4F6; 
        padding-bottom: env(safe-area-inset-bottom, 24px);
        box-sizing: border-box;
    }
    iframe { 
        width: 100%; 
        height: 100%; 
        border: none; 
        display: block; 
    }
  </style>
</head>
<body>

  <div id="splash-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #F2F4F6; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease-out;">
    <img src="https://i.postimg.cc/9Q6Ck3CV/Gemini-Generated-Image-yyrm1iyyrm1iyyrm.png" style="width: 100%; height: 100%; object-fit: cover; position: absolute;">
  </div>

  <iframe id="app-frame" src="https://script.google.com/macros/s/AKfycbyfXbkdGHFRpBWsrEl16jEotNmVv8sJOqk3_u-8duYBP96jUdmQqcRFjdWqOELu3OremQ/exec"></iframe>

  <script>
    // 💡 window.onload를 없애서 구글 스크립트 눈치 보지 않고 무조건 실행되게 변경!
    
    // (1) 카톡 파라미터 전달 로직
    const urlParams = new URLSearchParams(window.location.search);
    const roomCode = urlParams.get('room');
    const iframe = document.getElementById('app-frame');

    if (roomCode) {
      iframe.src = iframe.src + "?room=" + roomCode;
    }

    // (2) 화면이 켜지자마자 무조건 2.5초 뒤에 사진 숨기기 (무한 로딩 방지)
    setTimeout(function() {
      const splash = document.getElementById('splash-screen');
      if (splash) {
        splash.style.opacity = '0'; // 부드럽게 투명해짐
        setTimeout(() => { 
          splash.style.display = 'none'; // 뒤에 버튼을 누를 수 있게 완전히 치워줌
        }, 500);
      }
    }, 2500); // 2.5초
  </script>

</body>
</html>
