<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>우리집 여행비서</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #F2F4F6; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
    
    /* 🚀 투명 방패 제거: pointer-events: none 추가 */
    #splash-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-color: #F2F4F6; z-index: 9999;
        display: flex; justify-content: center; align-items: center;
        transition: opacity 0.5s ease-out;
        pointer-events: none; 
    }
    #splash-screen img { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>

  <div id="splash-screen">
    <img src="https://i.postimg.cc/9Q6Ck3CV/Gemini-Generated-Image-yyrm1iyyrm1iyyrm.png">
  </div>

  <iframe id="app-frame" src="https://script.google.com/macros/s/AKfycbyfXbkdGHFRpBWsrEl16jEotNmVv8sJOqk3_u-8duYBP96jUdmQqcRFjdWqOELu3OremQ/exec"></iframe>

  <script>
    (function() {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        const roomCode = urlParams.get('room');
        const iframe = document.getElementById('app-frame');
        if (roomCode && iframe) iframe.src = iframe.src + "?room=" + roomCode;
      } catch (e) {}

      setTimeout(function() {
        const splash = document.getElementById('splash-screen');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(() => { splash.style.display = 'none'; }, 500);
        }
      }, 2500);
    })();
  </script>

</body>
</html>
