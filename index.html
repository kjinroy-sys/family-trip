<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>우리집 여행비서</title>
  <style>
    body, html { 
        margin: 0; 
        padding: 0; 
        height: 100%; 
        width: 100%;
        overflow: hidden; 
        background-color: #F2F4F6; 
        /* 핵심!: 하단 홈 버튼 영역만큼 알아서 여백을 띄워줍니다 (기본 24px) */
        padding-bottom: env(safe-area-inset-bottom, 24px);
        box-sizing: border-box;
    }
    iframe { 
        width: 100%; 
        height: 100%; 
        border: none; 
        display: block; 
    }
  </style>
</head>
<body>
  <div id="splash-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: white; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease-out;">
    <img src="https://i.postimg.cc/mD71v1wL/1000039553.jpg" style="width: 100%; height: 100%; object-fit: cover;">
</div>
  <iframe src="https://script.google.com/macros/s/AKfycbyfXbkdGHFRpBWsrEl16jEotNmVv8sJOqk3_u-8duYBP96jUdmQqcRFjdWqOELu3OremQ/exec"></iframe>               
</body>
</html>
