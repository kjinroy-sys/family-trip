<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>우리집 여행비서</title>
  <style>
    /* 배경색을 이미지와 유사한 톤으로 맞춰서 깜빡임 방지 */
    body, html { 
        margin: 0; 
        padding: 0; 
        height: 100%; 
        width: 100%;
        overflow: hidden; 
        background-color: #F2F4F6; 
        padding-bottom: env(safe-area-inset-bottom, 24px);
        box-sizing: border-box;
    }
    iframe { 
        width: 100%; 
        height: 100%; 
        border: none; 
        display: block; 
    }
    /* 스플래시 화면: 텍스트 없이 이미지만 꽉 차게 설정 */
    #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #F2F4F6;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: opacity 0.5s ease-out;
    }
    #splash-screen img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
  </style>
</head>
<body>

  <div id="splash-screen">
    <img src="https://i.postimg.cc/9Q6Ck3CV/Gemini-Generated-Image-yyrm1iyyrm1iyyrm.png">
  </div>

  <iframe id="app-frame" src="https://script.google.com/macros/s/AKfycbyfXbkdGHFRpBWsrEl16jEotNmVv8sJOqk3_u-8duYBP96jUdmQqcRFjdWqOELu3OremQ/exec"></iframe>

  <script>
    // 🚀 실행되자마자 즉시 타이머 가동 (멈춤 방지 핵심)
    (function() {
      // 1. 초대 링크(?room=) 처리
      try {
        const urlParams = new URLSearchParams(window.location.search);
        const roomCode = urlParams.get('room');
        const iframe = document.getElementById('app-frame');

        if (roomCode && iframe) {
          // 주소 뒤에 파라미터를 붙여서 다시 로드
          iframe.src = iframe.src + "?room=" + roomCode;
        }
      } catch (e) {
        console.error("초대 링크 처리 중 오류:", e);
      }

      // 2. 무조건 실행되는 타이머 (2.5초 후 스플래시 제거)
      setTimeout(function() {
        const splash = document.getElementById('splash-screen');
        if (splash) {
          splash.style.opacity = '0'; // 부드럽게 사라짐
          setTimeout(function() {
            splash.style.display = 'none'; // 완전히 제거하여 클릭 방해 금지
          }, 500);
        }
      }, 2500);
    })();
  </script>

</body>
</html>
