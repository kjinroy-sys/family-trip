<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>우리집 여행비서</title>
  <style>
    /* 화면 전체 여백 제거 및 스크롤 방지 */
    body, html { 
        margin: 0; 
        padding: 0; 
        height: 100%; 
        width: 100%;
        overflow: hidden; 
        background-color: #F2F4F6; 
    }
    /* iframe을 화면에 꽉 차게 고정 */
    iframe { 
        position: absolute;
        top: 0;
        left: 0;
        width: 100%; 
        height: 100%; 
        border: none; 
        display: block; 
    }
  </style>
</head>
<body>
  <iframe src="https://script.google.com/macros/s/AKfycbyfXbkdGHFRpBWsrEl16jEotNmVv8sJOqk3_u-8duYBP96jUdmQqcRFjdWqOELu3OremQ/exec"></iframe>
</body>
</html>
